version: '3.8'

services:
  app:
    image: finally:test
    ports:
      - "8001:8000"
    environment:
      - LLM_MOCK=true
      - OPENROUTER_API_KEY=mock-key-for-testing
    volumes:
      - finally-test-data:/app/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  finally-test-data:
